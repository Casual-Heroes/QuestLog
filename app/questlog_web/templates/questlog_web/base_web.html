{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="flex min-h-screen bg-gradient-to-br from-neutral-950 via-neutral-900 to-neutral-950">
  <!-- Sidebar -->
  {% include "questlog_web/partials/web_sidebar.html" %}

  <!-- Main Content Area -->
  <div class="flex-1 lg:ml-64 min-w-0 p-4">
    {% block web_content %}
    <!-- Page content goes here -->
    {% endblock %}
  </div>
</div>
{% endblock %}

{% block extra_js %}
{% if web_user and web_user.show_playing_status %}
<script>
(function() {
  const MY_ID = {{ web_user.id }};
  const PLAY_GLOW = ['ring-2', 'ring-cyan-400', 'shadow-[0_0_10px_#22d3ee]'];
  const LIVE_GLOW = ['ring-2', 'ring-rose-500', 'shadow-[0_0_10px_#f43f5e]'];
  const NAV_PLAY_GLOW = ['ring-cyan-400', 'shadow-[0_0_8px_#22d3ee]'];
  const NAV_LIVE_GLOW = ['ring-rose-500', 'shadow-[0_0_8px_#f43f5e]'];
  const NAV_DEFAULT = ['ring-indigo-700'];

  function applyStatus(game, isLive) {
    const activeGlow = isLive ? LIVE_GLOW : (game ? PLAY_GLOW : []);
    const navActiveGlow = isLive ? NAV_LIVE_GLOW : (game ? NAV_PLAY_GLOW : []);

    // --- Sidebar avatar glow ---
    const avatar = document.getElementById('sidebar-avatar');
    if (avatar) {
      [...PLAY_GLOW, ...LIVE_GLOW].forEach(cls => avatar.classList.remove(cls));
      activeGlow.forEach(cls => avatar.classList.add(cls));
    }

    // --- Top nav avatars (desktop + mobile) ---
    ['nav-avatar-desktop', 'nav-avatar-mobile'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      [...NAV_PLAY_GLOW, ...NAV_LIVE_GLOW, ...NAV_DEFAULT].forEach(c => el.classList.remove(c));
      if (navActiveGlow.length) navActiveGlow.forEach(c => el.classList.add(c));
      else NAV_DEFAULT.forEach(c => el.classList.add(c));
    });

    // --- Sidebar game name badge ---
    const badge = document.getElementById('sidebar-playing-badge');
    const gameName = document.getElementById('sidebar-playing-game');
    if (badge && gameName) {
      if (game) { gameName.textContent = game; badge.classList.remove('hidden'); }
      else { badge.classList.add('hidden'); }
    }
  }

  async function pollNowPlaying() {
    try {
      const res = await fetch('/ql/api/me/now-playing/', { credentials: 'same-origin' });
      if (!res.ok) return;
      const data = await res.json();
      applyStatus(data.current_game || null, !!data.is_live);
    } catch (_) {}
  }

  pollNowPlaying();
  setInterval(pollNowPlaying, 30000);
})();
</script>
{% endif %}
{% endblock %}
