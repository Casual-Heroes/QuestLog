{% extends "base.html" %}
{% load static %}

{% block title %}{{ guild_name }} - Member Portal - QuestLog{% endblock %}

{% block content %}
<!-- Break out of base.html's max-w-7xl px-4 sm:px-6 container so the portal fills full viewport width -->
<div class="-mx-4 sm:-mx-6">
<div class="flex min-h-screen bg-gradient-to-br from-neutral-950 via-neutral-900 to-neutral-950">
  {% include "questlog_web/partials/fluxer_member_sidebar.html" %}

  <!-- Main Content Area -->
  <div class="flex-1 lg:ml-64 min-w-0 p-4 lg:p-6 overflow-x-hidden">
    {% block guild_content %}{% endblock %}
  </div>
</div>
</div>
{% endblock %}
