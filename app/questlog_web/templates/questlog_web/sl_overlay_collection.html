<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: transparent;
  width: 1920px;
  height: 1080px;
  overflow: visible;
  font-family: 'Segoe UI', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
.panel {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 400px;
  background: rgba(0,0,0,0.85);
  border-left: 5px solid #d97706;
  border-radius: 0 8px 8px 0;
  max-height: 1040px;
  overflow: hidden;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.12);
}
.build-name {
  font-size: 16px;
  font-weight: 800;
  color: #d97706;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 240px;
}
.progress-text {
  font-size: 20px;
  font-weight: 900;
  color: #fff;
  flex-shrink: 0;
}
.progress-bar {
  height: 4px;
  background: rgba(255,255,255,0.08);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #92400e, #d97706);
  transition: width 0.5s;
}
.item {
  display: flex;
  align-items: center;
  padding: 4px 14px;
  gap: 10px;
}
.item.done {
  background: rgba(34,197,94,0.10);
  border-left: 2px solid #22c55e;
  animation: item-check-fade 8s ease forwards;
}
@keyframes item-check-fade {
  0%, 82% { opacity: 1; transform: translateX(0); }
  100% { opacity: 0; transform: translateX(12px); }
}
.dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 2px solid #4b5563;
  flex-shrink: 0;
}
.dot.done { background: #22c55e; border-color: #22c55e; }
.dot.done {
  width: 15px;
  height: 15px;
  border-radius: 3px;
  position: relative;
}
.dot.done::after {
  content: '✓';
  position: absolute;
  left: 1px;
  top: -5px;
  color: #ecfdf5;
  font-size: 13px;
  font-weight: 900;
}
.name {
  font-size: 15px;
  font-weight: 600;
  color: #f3f4f6;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.name.done { color: #86efac; }
.type {
  font-size: 10px;
  font-weight: 700;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  flex-shrink: 0;
  min-width: 52px;
  text-align: right;
}
.items-more, .items-complete {
  color: #6b7280;
  font-size: 12px;
  text-align: center;
  padding: 8px 14px;
}
.footer {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 5px 14px;
  font-size: 10px;
  color: #374151;
}
</style>
</head>
<body>
<div class="panel">
  <div class="header">
    <span class="build-name" id="bname">Loading...</span>
    <span class="progress-text" id="prog">-/-</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="bar" style="width:0%"></div></div>
  <div id="list"></div>
  <div class="footer">questlog.casual-heroes.com</div>
</div>

<script>
var POLL_URL = '{{ poll_url|escapejs }}';

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

var itemState = null;
var itemFades = {};
var itemsSnapshot = [];
var itemsSignature = null;
var ITEM_FADE_MS = 8000;
var MAX_VISIBLE_ITEMS = 14;

function itemKey(it) {
  return String(it.type||'item') + '\u0000' + String(it.name||'');
}

function renderItems(items, force) {
  var now = Date.now();
  var nextState = {};
  var pending = [];
  var fading = [];
  var newlyCollected = false;
  itemsSnapshot = items.slice();
  items.forEach(function(it) {
    var key = itemKey(it);
    var collected = !!it.collected;
    var previous = itemState === null ? collected : itemState[key];
    nextState[key] = collected;
    if (itemState !== null && collected && previous === false) {
      itemFades[key] = now + ITEM_FADE_MS;
      newlyCollected = true;
    }
    if (!collected) pending.push(it);
    else if ((itemFades[key] || 0) > now) fading.push(it);
  });
  itemState = nextState;
  var signature = items.map(function(it) {
    return itemKey(it) + ':' + (!!it.collected ? '1' : '0');
  }).join('|') + '|confirming:' + fading.map(itemKey).join('|');
  if (!force && signature === itemsSignature && !newlyCollected) return;
  itemsSignature = signature;
  Object.keys(itemFades).forEach(function(key) {
    if ((itemFades[key] || 0) <= now || nextState[key] !== true) {
      delete itemFades[key];
    }
  });

  var visiblePending = pending.slice(0, Math.max(0, MAX_VISIBLE_ITEMS-fading.length));
  var visible = fading.concat(visiblePending);
  var html = '';
  visible.forEach(function(it) {
    var dc = it.collected ? ' done' : '';
    html += '<div class="item' + dc + '">' +
      '<div class="dot' + dc + '"></div>' +
      '<span class="name' + dc + '">' + esc(it.name) + '</span>' +
      '<span class="type">' + esc(it.type) + '</span>' +
      '</div>';
  });
  if (pending.length > visiblePending.length) {
    html += '<div class="items-more">+'+(pending.length-visiblePending.length)+' more remaining</div>';
  } else if (!visible.length && items.length) {
    html = '<div class="items-complete">✓ All build items collected</div>';
  }
  document.getElementById('list').innerHTML = html;
  if (newlyCollected) {
    window.setTimeout(function() {
      renderItems(itemsSnapshot, true);
    }, ITEM_FADE_MS + 50);
  }
}

function load() {
  fetch(POLL_URL, {cache:'no-store'})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d || d.error) return;
      document.getElementById('bname').textContent = d.build_name || 'Collection Run';
      document.getElementById('prog').textContent  = d.progress || '0/0';
      var pct = d.total ? Math.round(d.collected / d.total * 100) : 0;
      document.getElementById('bar').style.width = pct + '%';

      renderItems(d.items || []);
    })
    .catch(function(){});
}

load();
setInterval(load, 1000);
</script>
</body>
</html>
