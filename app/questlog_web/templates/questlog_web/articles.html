{% extends "questlog_web/base_web.html" %}
{% load static %}

{% block title %}Gaming News - QuestLog{% endblock %}

{% block web_content %}
{% include 'questlog/partials/custom_select.html' %}

<script>
  function escapeHtml(text) {
    if (text == null || text === undefined) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
</script>

<!-- Header -->
<div class="bg-gradient-to-br from-neutral-900 to-neutral-950 border-b border-neutral-800 p-6 mb-6">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-white flex items-center gap-3">
      <i class="fas fa-newspaper text-orange-400"></i>
      Gaming News
    </h1>
    <p class="text-gray-400 mt-1">Latest articles from gaming news feeds</p>
  </div>
</div>

<!-- Filters -->
<div class="max-w-7xl mx-auto px-4">
  <div class="bg-neutral-900/50 rounded-lg border border-neutral-800 p-4 mb-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="text-sm text-gray-300 mb-2 block">Search</label>
        <input type="text" id="searchFilter" placeholder="Search articles..." class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-4 py-2 text-white text-sm focus:border-orange-500 focus:outline-none hover:bg-neutral-700/50 transition-colors">
      </div>
      <div>
        <label class="text-sm text-gray-300 mb-2 block">Sort By</label>
        <div id="sortFilterContainer"></div>
      </div>
    </div>
  </div>

  <div id="articlesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mb-8">
    <div class="col-span-full text-center text-gray-500 py-12">
      <i class="fas fa-spinner fa-spin text-4xl mb-2"></i>
      <p>Loading articles...</p>
    </div>
  </div>
</div>

<script>
let allArticles = [];
let sortFilterSelect;

sortFilterSelect = createCustomSelect({
  container: '#sortFilterContainer',
  name: 'sortFilter',
  placeholder: 'Newest First',
  items: [
    { value: 'newest', label: 'Newest First' },
    { value: 'oldest', label: 'Oldest First' }
  ],
  selected: 'newest',
  color: 'orange',
  onSelect: function() { filterArticles(); }
});

document.addEventListener('DOMContentLoaded', () => {
  loadArticles();
  document.getElementById('searchFilter').addEventListener('input', filterArticles);
});

async function loadArticles() {
  try {
    const response = await fetch('{% url "questlog_web_api_articles" %}');
    const data = await response.json();
    allArticles = data.articles || [];
    filterArticles();
  } catch (error) {
    console.error('Failed to load articles:', error);
    document.getElementById('articlesList').innerHTML = `
      <div class="col-span-full text-center text-red-400 py-12">
        <i class="fas fa-exclamation-circle text-4xl mb-2"></i>
        <p>Failed to load articles. Please try again later.</p>
      </div>
    `;
  }
}

function filterArticles() {
  const search = document.getElementById('searchFilter').value.toLowerCase();
  const sort = sortFilterSelect ? sortFilterSelect.getValue() : 'newest';

  let filtered = [...allArticles];

  if (search) {
    filtered = filtered.filter(a =>
      a.title.toLowerCase().includes(search) ||
      (a.summary && a.summary.toLowerCase().includes(search)) ||
      (a.author && a.author.toLowerCase().includes(search))
    );
  }

  if (sort === 'newest') filtered.sort((a, b) => (b.published_at || 0) - (a.published_at || 0));
  else if (sort === 'oldest') filtered.sort((a, b) => (a.published_at || 0) - (b.published_at || 0));

  renderArticles(filtered);
}

function renderArticles(articles) {
  const container = document.getElementById('articlesList');

  if (!articles.length) {
    container.innerHTML = `
      <div class="col-span-full text-center text-gray-500 py-12">
        <i class="fas fa-newspaper text-6xl mb-4 opacity-50"></i>
        <p class="text-xl mb-2">No articles found</p>
        <p class="text-sm">Check back later for new gaming news!</p>
      </div>
    `;
    return;
  }

  container.innerHTML = articles.map(article => `
    <a href="${escapeHtml(article.url)}" target="_blank" rel="noopener"
       class="bg-neutral-900/50 border border-neutral-800 rounded-lg overflow-hidden hover:border-orange-500/30 transition block group">
      ${article.image_url
        ? `<div class="aspect-video overflow-hidden"><img src="${escapeHtml(article.image_url)}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" loading="lazy"></div>`
        : `<div class="aspect-video bg-neutral-800 flex items-center justify-center"><i class="fas fa-newspaper text-gray-600 text-4xl"></i></div>`
      }
      <div class="p-4">
        <h3 class="text-white font-medium line-clamp-2 mb-2 group-hover:text-orange-400 transition">${escapeHtml(article.title)}</h3>
        ${article.summary ? `<p class="text-gray-400 text-sm line-clamp-2 mb-2">${escapeHtml(article.summary)}</p>` : ''}
        <div class="flex items-center justify-between text-xs text-gray-500">
          ${article.author ? `<span>${escapeHtml(article.author)}</span>` : '<span></span>'}
          ${article.published_at ? `<span>${formatDate(article.published_at)}</span>` : ''}
        </div>
      </div>
    </a>
  `).join('');
}

function formatDate(timestamp) {
  const date = new Date(timestamp * 1000);
  const now = new Date();
  const diffMs = now - date;
  const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

  if (diffHours < 1) return 'Just now';
  if (diffHours < 24) return `${diffHours}h ago`;
  if (diffDays < 7) return `${diffDays}d ago`;

  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
</script>
{% endblock %}
