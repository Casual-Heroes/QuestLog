<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: transparent;
  width: 1920px; height: 1080px;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
.alert {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(7,0,0,0.95);
  border: 2px solid #dc2626;
  border-radius: 12px;
  padding: 28px 48px;
  text-align: center;
  opacity: 0;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  box-shadow: 0 0 60px rgba(220,38,38,0.5), 0 0 120px rgba(220,38,38,0.2);
}
.alert.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.alert-skull {
  font-size: 48px;
  margin-bottom: 8px;
  animation: skull-shake 0.5s ease-in-out infinite;
}
@keyframes skull-shake {
  0%,100%{ transform: rotate(0deg); }
  25%{ transform: rotate(-8deg); }
  75%{ transform: rotate(8deg); }
}
.alert-title {
  font-size: 42px;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #dc2626;
  text-shadow: 0 0 30px rgba(220,38,38,0.8);
  animation: flicker 0.6s ease-in-out infinite;
}
@keyframes flicker {
  0%,100%{ opacity:1; }
  50%{ opacity:0.75; }
}
.alert-streak {
  font-size: 18px;
  font-weight: 700;
  color: #ef4444;
  letter-spacing: 0.08em;
  margin-top: 6px;
  opacity: 0.85;
}
.alert-bar {
  height: 3px;
  background: rgba(220,38,38,0.3);
  border-radius: 2px;
  margin-top: 18px;
  overflow: hidden;
}
.alert-bar-fill {
  height: 100%;
  background: #dc2626;
  border-radius: 2px;
  width: 100%;
  transform-origin: left;
  animation: countdown 4s linear forwards;
}
@keyframes countdown {
  from { transform: scaleX(1); }
  to   { transform: scaleX(0); }
}
</style>
</head>
<body>
<div class="alert" id="alert">
  <div class="alert-skull">💀</div>
  <div class="alert-title">Gone Hollow</div>
  <div class="alert-streak" id="streak-text"></div>
  <div class="alert-bar"><div class="alert-bar-fill" id="bar-fill"></div></div>
</div>

<script>
var POLL_URL = '{{ poll_url }}';
var lastHollow = false;
var lastStreak = -1;
var showing = false;
var hideTimer = null;

function load() {
  fetch(POLL_URL)
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (!d || d.error) return;
      var isHollow = d.is_hollow || false;
      var streak   = d.hollow_streak || 0;

      var justWentHollow  = isHollow && !lastHollow;
      var streakIncreased = isHollow && streak > lastStreak && lastStreak >= 0;

      if (justWentHollow || streakIncreased) {
        showAlert(streak);
      }

      if (!isHollow && lastHollow && showing) {
        hideAlert();
      }

      lastHollow = isHollow;
      lastStreak = streak;
    })
    .catch(function(){});
}

function showAlert(streak) {
  showing = true;
  clearTimeout(hideTimer);
  var alert = document.getElementById('alert');
  var streakEl = document.getElementById('streak-text');
  var bar = document.getElementById('bar-fill');

  streakEl.textContent = streak > 0 ? 'Gone Hollow ×' + (streak + 1) : '';
  alert.classList.remove('show');
  // Reset bar animation by removing and re-adding
  bar.style.animation = 'none';
  void bar.offsetWidth;
  bar.style.animation = 'countdown 4s linear forwards';

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      alert.classList.add('show');
    });
  });

  hideTimer = setTimeout(hideAlert, 4000);
}

function hideAlert() {
  showing = false;
  document.getElementById('alert').classList.remove('show');
}

}
load();
setInterval(load, 1000);
</script>
</body>
</html>
