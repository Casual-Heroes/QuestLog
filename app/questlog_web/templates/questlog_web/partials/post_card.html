<!-- Post Card Partial - Renders a single post in the feed -->
<!-- Used by: feed.html, public_profile.html -->
<!-- Expects JS context: post object with author, content, images, embed, likes, comments -->

<script>
// Guard: define autoExpandTextarea if not already provided by the host page (feed.html / home.html)
if (typeof autoExpandTextarea === 'undefined') {
  function autoExpandTextarea(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }
}

// Module-level: used by both renderPostCard and renderComment
function formatContent(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  let html = div.innerHTML;
  // renderInlineMarkdown handles bold/italic/underline/code AND URL linkification.
  // Only fall back to manual URL linkification if renderInlineMarkdown is unavailable.
  if (window.renderInlineMarkdown) {
    html = renderInlineMarkdown(html);
  } else {
    html = html.replace(/(https?:\/\/[^\s<"']+)/g, function(url) {
      var clean = url.replace(/[.,;:!?)]+$/, '');
      var trail = url.slice(clean.length);
      return '<a href="' + clean + '" target="_blank" rel="noopener noreferrer" class="text-indigo-400 hover:underline break-all">' + clean + '</a>' + trail;
    });
  }
  html = html.replace(/\n/g, '<br>');
  if (window._customEmojiMap) {
    html = html.replace(/:([a-zA-Z0-9_-]+):/g, (match, code) => {
      const url = window._customEmojiMap[code];
      return url
        ? `<img src="${url}" alt="${match}" title="${match}" class="inline-block w-6 h-6 object-contain align-middle" style="vertical-align:-4px">`
        : match;
    });
  }
  if (window.renderMentions) html = renderMentions(html);
  return html;
}

function buildGameTagHtml(tagName, steamId, coverUrl) {
  if (!tagName) return '';
  function _esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  const gameName = _esc(tagName);
  const steamUrl = steamId
    ? `https://store.steampowered.com/app/${steamId}/`
    : `https://store.steampowered.com/search/?term=${encodeURIComponent(tagName)}`;
  const img = coverUrl
    ? `<img src="${_esc(coverUrl)}" alt="" class="w-6 h-6 rounded object-cover flex-shrink-0" onerror="this.style.display='none'">`
    : `<i class="fas fa-gamepad flex-shrink-0"></i>`;
  return `<span class="inline-flex items-center gap-1.5 mb-2">
    <a href="${steamUrl}" target="_blank" rel="noopener"
      class="inline-flex items-center gap-1.5 px-2 py-1 bg-indigo-500/20 text-indigo-300 hover:bg-indigo-500/30 hover:text-indigo-200 rounded-full text-xs transition cursor-pointer"
      title="${steamId ? 'View on Steam' : 'Search on Steam'}">${img}<span>${gameName}</span><i class="fab fa-steam text-gray-500 text-[10px]"></i></a>
    <a href="/feed/?game=${encodeURIComponent(tagName)}" onclick="event.stopPropagation()"
      class="inline-flex items-center gap-1 px-2 py-1 bg-neutral-700/60 text-gray-400 hover:bg-indigo-500/20 hover:text-indigo-300 rounded-full text-xs transition"
      title="See all posts about ${gameName}"><i class="fas fa-newspaper text-[9px]"></i>Posts</a>
  </span>`;
}

function renderPostCard(post, options = {}) {
  const showAuthor = options.showAuthor !== false;
  const currentUserId = options.currentUserId || null;

  function escapePost(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function timeAgo(timestamp) {
    const seconds = Math.floor(Date.now() / 1000) - timestamp;
    if (seconds < 60) return 'just now';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
    if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
    if (seconds < 604800) return Math.floor(seconds / 86400) + 'd ago';
    return new Date(timestamp * 1000).toLocaleDateString();
  }

  function renderEmbed(post) {
    if (post.embed_platform === 'youtube' && post.embed_id) {
      return `<div class="relative w-full" style="padding-bottom:56.25%">
        <iframe src="https://www.youtube.com/embed/${escapePost(post.embed_id)}" class="absolute inset-0 w-full h-full rounded-lg" frameborder="0" allowfullscreen loading="lazy"></iframe>
      </div>`;
    }
    if (post.embed_platform === 'twitch' && post.embed_id) {
      const isClip = !/^\d+$/.test(post.embed_id);
      const src = isClip
        ? `https://clips.twitch.tv/embed?clip=${escapePost(post.embed_id)}&parent=${location.hostname}`
        : `https://player.twitch.tv/?video=${escapePost(post.embed_id)}&parent=${location.hostname}`;
      return `<div class="relative w-full" style="padding-bottom:56.25%">
        <iframe src="${src}" class="absolute inset-0 w-full h-full rounded-lg" frameborder="0" allowfullscreen loading="lazy"></iframe>
      </div>`;
    }
    if (post.embed_platform === 'tiktok' && post.embed_id) {
      return `<div class="bg-neutral-800 rounded-lg p-4 flex items-center gap-3">
        <i class="fab fa-tiktok text-2xl text-pink-400"></i>
        <a href="${escapePost(post.media_url)}" target="_blank" rel="noopener" class="text-blue-400 hover:underline text-sm">View on TikTok</a>
      </div>`;
    }
    if (post.embed_platform === 'instagram' && post.embed_id) {
      return `<div class="bg-neutral-800 rounded-lg p-4 flex items-center gap-3">
        <i class="fab fa-instagram text-2xl text-pink-500"></i>
        <a href="${escapePost(post.media_url)}" target="_blank" rel="noopener" class="text-blue-400 hover:underline text-sm">View on Instagram</a>
      </div>`;
    }
    if (post.embed_platform === 'twitter' && post.embed_id) {
      return `<div class="bg-neutral-800 rounded-lg p-4 flex items-center gap-3">
        <i class="fab fa-x-twitter text-2xl text-white"></i>
        <a href="${escapePost(post.media_url)}" target="_blank" rel="noopener" class="text-blue-400 hover:underline text-sm">View on X</a>
      </div>`;
    }
    if (post.embed_platform === 'kick' && post.embed_id) {
      return `<div class="bg-neutral-800 rounded-lg p-4 flex items-center gap-3">
        <span class="text-2xl font-bold text-green-400">K</span>
        <a href="${escapePost(post.media_url)}" target="_blank" rel="noopener" class="text-blue-400 hover:underline text-sm">View on Kick</a>
      </div>`;
    }
    return '';
  }

  function renderImages(images) {
    if (!images || images.length === 0) return '';
    const count = images.length;

    // Single image: natural aspect ratio, centered, max-height cap
    if (count === 1) {
      return `<div class="rounded-lg overflow-hidden flex justify-center bg-neutral-950/50">` +
        `<img src="${escapePost(images[0].image_url)}" alt="Post image"` +
        ` class="max-w-full max-h-[520px] object-contain cursor-pointer hover:opacity-90 transition rounded-lg"` +
        ` onclick="window.open('${escapePost(images[0].image_url)}', '_blank')"` +
        ` loading="lazy"></div>`;
    }

    // 2+ images: grid with fixed-height crop (like Twitter)
    let gridClass = 'grid gap-1 rounded-lg overflow-hidden';
    gridClass += count === 2 ? ' grid-cols-2' : ' grid-cols-2';
    let html = `<div class="${gridClass}">`;
    images.forEach((img, i) => {
      const span = (count === 3 && i === 0) ? 'col-span-1 row-span-2' : '';
      const h = count === 2 ? 'h-64' : 'h-48';
      html += `<img src="${escapePost(img.image_url)}" alt="Post image"` +
        ` class="w-full ${h} object-cover cursor-pointer hover:opacity-90 transition ${span}"` +
        ` onclick="openLightbox('${escapePost(img.image_url)}')"` +
        ` loading="lazy">`;
    });
    html += '</div>';
    return html;
  }

  // formatContent is defined at module scope above

  // Follow button: show on global feed for users you don't follow (and not yourself)
  const showFollowBtn = showAuthor && post.author && currentUserId
    && post.author.id !== currentUserId && !post.author._following;

  const authorHtml = showAuthor && post.author ? (() => {
    const a = post.author;
    const flairBadge = a.flair_emoji
      ? `<span class="text-xs text-yellow-300 font-medium ml-1" title="${escapePost(a.flair_name || '')}">${escapePost(a.flair_emoji)}</span>`
      : '';
    const rankBadge = a.rank_title
      ? `<span class="text-xs text-amber-400/70 font-medium ml-1">· ${escapePost(a.rank_title)}</span>`
      : '';
    const vipBadge = a.is_vip && !a.flair_emoji
      ? `<span class="text-xs text-purple-300 font-semibold ml-1" title="Early Tester">⭐</span>`
      : '';
    const ffxivBadge = a.is_ffxiv_member
      ? `<span class="inline-flex items-center gap-0.5 text-xs text-blue-300 font-medium ml-1" title="Casual Heroes FC Member"><img src="/static/img/games/guilds/ffxiv_logo.png" class="w-3 h-3 object-contain inline-block"> Casual Heroes</span>`
      : '';
    const isPlaying = !!a.current_game;
    const isLive = !!a.is_live;
    // Live takes priority for ring color, but both badges show
    const avatarGlow = isLive
      ? 'ring-2 ring-rose-500 shadow-[0_0_10px_#f43f5e]'
      : isPlaying
        ? 'ring-2 ring-cyan-400 shadow-[0_0_10px_#22d3ee]'
        : '';
    const steamUrl = a.current_game_appid
      ? `https://store.steampowered.com/app/${a.current_game_appid}/`
      : `https://store.steampowered.com/search/?term=${encodeURIComponent(a.current_game || '')}`;
    const playingBadge = isPlaying
      ? `<span class="inline-flex items-center gap-1 text-[10px] text-cyan-400 font-semibold mt-0.5"><i class="fas fa-gamepad text-[9px]"></i>Playing Now &middot; <a href="${steamUrl}" target="_blank" rel="noopener" class="truncate max-w-[120px] hover:underline" title="View on Steam">${escapePost(a.current_game)}</a></span>`
      : '';
    const livePlatformLabel = a.live_platform === 'twitch' ? 'Twitch' : a.live_platform === 'youtube' ? 'YouTube' : (a.live_platform || 'Live');
    const liveBadge = isLive
      ? `<a href="${escapePost(a.live_url || '#')}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-[10px] text-rose-500 font-semibold mt-0.5 hover:text-rose-400"><span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse flex-shrink-0"></span>Live on ${escapePost(livePlatformLabel)}</a>`
      : '';
    const avatarEl = a.avatar_url
      ? `<img src="${escapePost(a.avatar_url)}" alt="" class="w-10 h-10 rounded-full object-cover flex-shrink-0 ${avatarGlow}">`
      : `<div class="w-10 h-10 rounded-full bg-indigo-700 flex items-center justify-center text-white font-bold text-sm flex-shrink-0 select-none ${avatarGlow}">${escapePost((a.display_name || a.username || '?').charAt(0).toUpperCase())}</div>`;
    return `
    <div class="flex items-center gap-3 mb-3">
      <a href="/u/${escapePost(a.username)}/">
        ${avatarEl}
      </a>
      <div class="flex-1 min-w-0">
        <div class="flex items-center flex-wrap gap-x-1">
          <a href="/u/${escapePost(a.username)}/" class="text-white font-semibold text-sm hover:underline">
            ${escapePost(a.display_name || a.username)}
          </a>${flairBadge}${rankBadge}${vipBadge}${ffxivBadge}
        </div>
        <p class="text-gray-500 text-xs">@${escapePost(a.username)} &middot; ${timeAgo(post.created_at)}</p>
        ${(playingBadge || liveBadge) ? `<div class="flex flex-col gap-0">${playingBadge}${liveBadge}</div>` : ''}
      </div>
      ${post.is_pinned ? '<span class="text-yellow-400 text-xs font-semibold"><i class="fas fa-thumbtack mr-0.5"></i>Pinned</span>' : ''}
      ${showFollowBtn ? `<button onclick="quickFollow(${a.id}, this)" class="follow-card-btn text-xs px-2.5 py-1 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white transition"><i class="fas fa-plus mr-1"></i>Follow</button>` : ''}
    </div>`;
  })() : '';

  const gameTagHtml = buildGameTagHtml(post.game_tag_name, post.game_tag_steam_id, post.game_tag_cover_url);

  // For text posts that contain a video URL, extract and embed client-side
  // (handles posts stored before server-side parsing supported the URL format)
  function extractEmbedFromText(content) {
    if (!content) return null;
    let m = content.match(/(?:youtube\.com\/(?:watch\?v=|live\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (m) return { embed_platform: 'youtube', embed_id: m[1] };
    m = content.match(/twitch\.tv\/videos\/(\d+)/);
    if (m) return { embed_platform: 'twitch', embed_id: m[1] };
    m = content.match(/clips\.twitch\.tv\/([a-zA-Z0-9_-]+)/);
    if (m) return { embed_platform: 'twitch', embed_id: m[1] };
    return null;
  }

  const _embedSource = post.embed_platform ? post
    : (!post.images?.length && !post.media_url ? extractEmbedFromText(post.content) : null);

  // If the content is only the video URL and we're embedding it, hide the redundant raw link
  const _isContentJustUrl = post.content && /^https?:\/\/\S+$/.test(post.content.trim());
  const _showContent = post.content && !(_embedSource && _isContentJustUrl);
  const COLLAPSE_LINE_THRESHOLD = 12; // lines before collapsing
  const COLLAPSE_CHAR_THRESHOLD = 500; // chars before collapsing
  const _contentLines = (post.content || '').split('\n').length;
  const _contentLong = _contentLines > COLLAPSE_LINE_THRESHOLD || (post.content || '').length > COLLAPSE_CHAR_THRESHOLD;
  const contentHtml = _showContent
    ? (_contentLong
      ? `<div class="post-content-collapse" data-expanded="false">
           <div class="post-content-text text-gray-200 text-sm whitespace-pre-wrap mb-1 post-content-clamp" style="max-height:14rem;overflow:hidden;mask-image:linear-gradient(to bottom,black 60%,transparent 100%);-webkit-mask-image:linear-gradient(to bottom,black 60%,transparent 100%);">${formatContent(post.content)}</div>
           <button onclick="event.stopPropagation();togglePostCollapse(this)" class="text-indigo-400 hover:text-indigo-300 text-xs font-semibold mb-3 transition flex items-center gap-1">
             <i class="fas fa-chevron-down text-[10px]"></i>Show more
           </button>
         </div>`
      : `<div class="post-content-text text-gray-200 text-sm whitespace-pre-wrap mb-3">${formatContent(post.content)}</div>`)
    : '';

  const mediaHtml = post.post_type === 'gif' && post.media_url
    ? `<img src="${escapePost(post.media_url)}" alt="GIF" class="rounded-lg max-h-80 w-auto cursor-pointer hover:opacity-90 transition" loading="lazy" onclick="openLightbox('${escapePost(post.media_url)}')">`
    : (_embedSource ? renderEmbed(_embedSource) : renderImages(post.images || []));

  // Link preview card (OG metadata) - only shown on text posts with no other media
  function renderLinkPreview(lp) {
    if (!lp || !lp.title) return '';
    // Don't show a preview that has no image and no description - just a bare title looks broken
    if (!lp.image && !lp.description) return '';
    const title = escapePost(lp.title);
    const desc = lp.description ? `<p class="text-gray-400 text-xs mt-0.5 line-clamp-2">${escapePost(lp.description)}</p>` : '';
    const siteName = lp.site_name ? `<p class="text-gray-500 text-xs mt-1 uppercase tracking-wide">${escapePost(lp.site_name)}</p>` : '';
    // Only allow https:// image URLs (server already validated, but double-check client-side)
    const imgSrc = (lp.image && /^https:\/\//i.test(lp.image)) ? lp.image : null;
    const imgHtml = imgSrc
      ? `<img src="${escapePost(imgSrc)}" alt="" class="w-full h-36 object-cover" loading="lazy">`
      : '';
    // Only allow https:// hrefs - block javascript:, data:, etc.
    const rawHref = lp.source_url || '';
    const href = /^https:\/\//i.test(rawHref) ? escapePost(rawHref) : '#';
    return `<a href="${href}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()"
      class="block rounded-xl border border-neutral-700 overflow-hidden hover:border-neutral-500 transition mt-1 mb-2 no-underline">
      ${imgHtml}
      <div class="px-3 py-2 bg-neutral-800/60">
        <p class="text-white text-sm font-semibold leading-snug">${title}</p>
        ${desc}
        ${siteName}
      </div>
    </a>`;
  }

  const linkPreviewHtml = (!mediaHtml && !_embedSource && post.link_preview)
    ? renderLinkPreview(post.link_preview)
    : '';

  const likedClass = post.liked_by_me ? 'text-red-400' : 'text-gray-500 hover:text-red-400';
  const likeIcon = post.liked_by_me ? 'fas fa-heart' : 'far fa-heart';

  const isOwnerOrAdmin = currentUserId && (post.author && post.author.id === currentUserId || options.isAdmin);

  // "Edited" badge - shows timestamp of last edit, clickable to reveal history
  const editedBadge = post.edited_at
    ? `<button onclick="showEditHistory(event, ${post.id})" class="text-gray-500 hover:text-gray-300 text-xs transition" title="View edit history">
        <i class="fas fa-pencil-alt text-[10px] mr-0.5"></i>edited ${timeAgo(post.edited_at)}
       </button>`
    : '';

  return `
    <div class="bg-neutral-900 rounded-xl border border-neutral-800 p-4 post-card cursor-pointer" data-post-id="${post.id}" data-author-id="${post.author ? post.author.id : ''}" data-current-user-id="${currentUserId || ''}" data-game-tag-name="${escapePost(post.game_tag_name || '')}" data-game-tag-steam-id="${post.game_tag_steam_id || ''}" data-game-tag-id="${post.game_tag_id || ''}" onclick="postCardClick(event, ${post.id}, '${post.public_id || post.id}')">
      ${authorHtml}
      <div class="post-game-tag-wrap" data-post-id="${post.id}">${gameTagHtml}</div>
      <div class="post-content-wrap">
        ${contentHtml}
        ${linkPreviewHtml}
        ${mediaHtml ? `<div class="mb-3">${mediaHtml}</div>` : ''}
      </div>
      <div id="edit-area-${post.id}" class="hidden mb-3">
        <textarea id="edit-textarea-${post.id}"
          class="w-full bg-neutral-800 border border-indigo-500 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none resize-none"
          rows="4" maxlength="3000"
          oninput="autoExpandTextarea(this)">${escapePost(post.content || '')}</textarea>
        <!-- Edit toolbar - matches composer bar -->
        <div class="mt-2 border-t border-neutral-700 pt-2">
          <!-- Game tag display -->
          <div id="edit-game-tag-${post.id}" class="hidden mb-2 flex items-center gap-2">
            <span class="inline-flex items-center gap-1 px-2 py-1 bg-indigo-500/20 text-indigo-300 rounded-full text-xs">
              <i class="fas fa-gamepad"></i>
              <span id="edit-game-tag-name-${post.id}"></span>
              <button onclick="clearEditGameTag(${post.id})" class="ml-1 hover:text-red-400"><i class="fas fa-times text-xs"></i></button>
            </span>
          </div>
          <!-- GIF preview -->
          <div id="edit-gif-preview-${post.id}" class="hidden mb-2"></div>
          <!-- Emoji picker -->
          <div id="edit-emoji-picker-${post.id}" class="hidden mb-2 bg-neutral-800 border border-neutral-700 rounded-xl p-3 max-h-52 overflow-y-auto">
            <div class="flex gap-1 mb-2 border-b border-neutral-700 pb-2 flex-wrap">
              <button onclick="showEditEmojiCat(${post.id},'gaming',this)" class="edit-emoji-cat-${post.id} edit-emoji-cat text-xs px-2 py-1 rounded bg-neutral-700 text-white">🎮 Gaming</button>
              <button onclick="showEditEmojiCat(${post.id},'smileys',this)" class="edit-emoji-cat-${post.id} edit-emoji-cat text-xs px-2 py-1 rounded text-gray-400 hover:bg-neutral-700">😀 Faces</button>
              <button onclick="showEditEmojiCat(${post.id},'hands',this)" class="edit-emoji-cat-${post.id} edit-emoji-cat text-xs px-2 py-1 rounded text-gray-400 hover:bg-neutral-700">👍 Hands</button>
              <button onclick="showEditEmojiCat(${post.id},'hearts',this)" class="edit-emoji-cat-${post.id} edit-emoji-cat text-xs px-2 py-1 rounded text-gray-400 hover:bg-neutral-700">❤️ React</button>
              <button onclick="showEditEmojiCat(${post.id},'objects',this)" class="edit-emoji-cat-${post.id} edit-emoji-cat text-xs px-2 py-1 rounded text-gray-400 hover:bg-neutral-700">⚡ Misc</button>
              <button onclick="showEditEmojiCat(${post.id},'custom',this)" class="edit-emoji-cat-${post.id} edit-emoji-cat text-xs px-2 py-1 rounded text-gray-400 hover:bg-neutral-700">✨ Custom</button>
            </div>
            <div id="edit-emoji-grid-${post.id}" class="grid grid-cols-10 gap-0.5"></div>
            <div id="edit-custom-emoji-grid-${post.id}" class="hidden grid grid-cols-8 gap-1"></div>
          </div>
          <!-- GIF picker -->
          <div id="edit-gif-picker-${post.id}" class="hidden mb-2 bg-neutral-800 border border-neutral-700 rounded-xl overflow-hidden">
            <div class="p-2 border-b border-neutral-700">
              <input type="text" placeholder="Search GIFs…" id="edit-gif-search-${post.id}"
                class="w-full bg-neutral-900 border border-neutral-600 rounded-lg px-3 py-1.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500"
                oninput="searchEditGifs(${post.id}, this.value)">
            </div>
            <div id="edit-gif-results-${post.id}" class="grid grid-cols-3 gap-1 p-2 max-h-48 overflow-y-auto">
              <p class="col-span-3 text-gray-500 text-xs text-center py-4">Search or browse trending GIFs</p>
            </div>
            <div class="px-2 py-1 border-t border-neutral-700 text-right"><span class="text-gray-600 text-xs">Powered by GIPHY</span></div>
          </div>
          <!-- Game search -->
          <div id="edit-game-search-${post.id}" class="hidden mb-2 relative">
            <input type="text" placeholder="Search for a game to tag…" id="edit-game-input-${post.id}"
              class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500"
              oninput="searchEditGames(${post.id}, this.value)">
            <div id="edit-game-results-${post.id}" class="hidden absolute left-0 right-0 top-full mt-1 bg-neutral-900 border border-neutral-700 rounded-lg shadow-lg z-50 max-h-48 overflow-y-auto"></div>
          </div>
          <!-- Bottom bar -->
          <div class="flex items-center justify-between gap-1">
            <div class="flex items-center gap-0.5">
              <button type="button" onmousedown="event.preventDefault();_postEditFmt(${post.id},'bold')" class="px-1.5 py-1 text-xs text-gray-400 hover:text-white hover:bg-neutral-700 rounded transition font-bold" title="Bold">B</button>
              <button type="button" onmousedown="event.preventDefault();_postEditFmt(${post.id},'italic')" class="px-1.5 py-1 text-xs text-gray-400 hover:text-white hover:bg-neutral-700 rounded transition italic" title="Italic">I</button>
              <button type="button" onmousedown="event.preventDefault();_postEditFmt(${post.id},'underline')" class="px-1.5 py-1 text-xs text-gray-400 hover:text-white hover:bg-neutral-700 rounded transition underline" title="Underline">U</button>
              <span class="w-px h-4 bg-neutral-600 mx-1"></span>
              <label class="cursor-pointer flex items-center gap-1.5 text-gray-500 hover:text-green-400 px-2.5 py-1.5 rounded-lg hover:bg-neutral-800 text-xs font-medium transition">
                <i class="fas fa-image"></i><span>Photo</span>
                <input type="file" accept="image/jpeg,image/png,image/gif,image/webp" multiple class="hidden" onchange="handleEditImageSelect(${post.id}, this)">
              </label>

// Post card click - navigate to permalink unless clicking a button/link/input
function postCardClick(event, postId, publicId) {
  if (event.target.closest('button, a, input, textarea, [onclick]:not(.post-card)')) return;
  const slug = publicId || postId;
  if (window.location.pathname === `post/${slug}/`) return;
  window.location.href = `/post/${slug}/`;
}

// Pin toggle
async function togglePin(postId, btn) {
  try {
    const res = await csrfFetch(`/api/posts/${postId}/pin/`, { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      const card = btn.closest('.post-card');
      if (data.is_pinned) {
        btn.classList.remove('text-gray-500', 'hover:text-yellow-400');
        btn.classList.add('text-yellow-400');
        btn.title = 'Unpin post';
        // Update pinned badge in header
        const header = card?.querySelector('.pinned-badge-slot');
        if (header) header.innerHTML = '<span class="text-yellow-400 text-xs font-semibold"><i class="fas fa-thumbtack mr-0.5"></i>Pinned</span>';
      } else {
        btn.classList.remove('text-yellow-400');
        btn.classList.add('text-gray-500', 'hover:text-yellow-400');
        btn.title = 'Pin post';
        const header = card?.querySelector('.pinned-badge-slot');
        if (header) header.innerHTML = '';
      }
    }
  } catch(e) { console.error('Pin error:', e); }
}

// Post edit - enter inline edit mode
function startPostEdit(event, postId, btn) {
  event.stopPropagation();
  const card = btn.closest('.post-card');
  const contentWrap = card.querySelector('.post-content-wrap');
  const editArea = document.getElementById(`edit-area-${postId}`);
  const textarea = document.getElementById(`edit-textarea-${postId}`);
  if (!editArea || !textarea) return;
  contentWrap.classList.add('hidden');
  editArea.classList.remove('hidden');
  textarea.focus();
  textarea.selectionStart = textarea.selectionEnd = textarea.value.length;
  autoExpandTextarea(textarea);
  // char count - guard against stacking listeners on repeat opens
  const counter = document.getElementById(`edit-char-count-${postId}`);
  if (counter) counter.textContent = `${textarea.value.length} / 3000`;
  if (!textarea._charCountBound) {
    textarea._charCountBound = true;
    textarea.addEventListener('input', () => {
      if (counter) counter.textContent = `${textarea.value.length} / 3000`;
    });
  }
  // Pre-populate game tag from post data if present
  const state = _editStateFor(postId);
  state.gameTagCleared = false;
  const postCard = card;
  const existingTagWrap = postCard.querySelector('.post-game-tag-wrap');
  const existingTagName = postCard.dataset.gameTagName || '';
  const existingTagSteamId = postCard.dataset.gameTagSteamId || null;
  const existingTagId = postCard.dataset.gameTagId || null;
  if (existingTagName && !state.gameTag) {
    state.gameTag = { id: existingTagId ? parseInt(existingTagId) : null, name: existingTagName, steam_id: existingTagSteamId ? parseInt(existingTagSteamId) : null };
    const tagEl = document.getElementById(`edit-game-tag-${postId}`);
    const tagNameEl = document.getElementById(`edit-game-tag-name-${postId}`);
    if (tagEl && tagNameEl) { tagNameEl.textContent = existingTagName; tagEl.classList.remove('hidden'); }
  }
}

function _postEditFmt(postId, type) {
  const ta = document.getElementById(`edit-textarea-${postId}`);
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  const map = { bold: ['**','**'], italic: ['*','*'], underline: ['<u>','</u>'] };
  const [pre, post] = map[type];
  const ins = sel || (type === 'bold' ? 'bold' : type === 'italic' ? 'italic' : 'underline');
  ta.value = ta.value.substring(0, s) + pre + ins + post + ta.value.substring(e);
  ta.selectionStart = s + pre.length;
  ta.selectionEnd = s + pre.length + ins.length;
  ta.focus();
  ta.dispatchEvent(new Event('input'));
}

function cancelPostEdit(postId) {
  const card = document.querySelector(`.post-card[data-post-id="${postId}"]`);
  if (!card) return;
  card.querySelector('.post-content-wrap').classList.remove('hidden');
  document.getElementById(`edit-area-${postId}`).classList.add('hidden');
  _closeEditPickers(postId);
  // Reset edit btn
  const editBtn = document.getElementById(`edit-btn-${postId}`);
  if (editBtn) { editBtn.disabled = false; editBtn.innerHTML = '<i class="fas fa-pencil-alt"></i>'; }
}

async function savePostEdit(postId) {
  const textarea = document.getElementById(`edit-textarea-${postId}`);
  if (!textarea) return;
  const newContent = textarea.value.trim();
  if (!newContent) return;
  const state = _editStateFor(postId);
  const saveBtn = document.querySelector(`#edit-area-${postId} button[onclick^="savePostEdit"]`);
  if (saveBtn) { saveBtn.disabled = true; saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin text-xs"></i> Saving...'; }
  try {
    const body = { content: newContent };
    if (state.gameTag) {
      body.game_tag_id = state.gameTag.id;
      body.game_tag_name = state.gameTag.name;
      if (state.gameTag.steam_id) body.game_tag_steam_id = state.gameTag.steam_id;
    } else if (state.gameTagCleared) {
      body.clear_game_tag = true;
    }
    if (state.gif) { body.media_url = state.gif.url; body.post_type = 'gif'; }

    // If new images selected, upload them first via FormData
    if (state.newImages && state.newImages.length) {
      const fd = new FormData();
      fd.append('content', newContent);
      state.newImages.forEach(f => fd.append('images', f));
      if (state.gameTag) { fd.append('game_tag_id', state.gameTag.id); fd.append('game_tag_name', state.gameTag.name); }
      const uploadRes = await csrfFetch(`/api/posts/${postId}/edit/`, { method: 'PUT', body: fd });
      const uploadData = await uploadRes.json();
      if (uploadData.success && uploadData.post) {
        _finishEditUpdate(postId, uploadData.post);
        delete _editState[postId];
        cancelPostEdit(postId);
      } else { showToast(uploadData.error || 'Save failed', true); }
      if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = '<i class="fas fa-paper-plane text-xs"></i>Save'; }
      return;
    }

    const res = await csrfFetch(`/api/posts/${postId}/edit/`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.success && data.post) {
      // Re-render just the content area and edited badge
      const card = document.querySelector(`.post-card[data-post-id="${postId}"]`);
      if (card) {
        const contentWrap = card.querySelector('.post-content-wrap');
        // Update displayed text
        const textEl = contentWrap.querySelector('.text-gray-200');
        _finishEditUpdate(postId, data.post);
      }
      delete _editState[postId];
      cancelPostEdit(postId);
      showToast('Post updated');
    } else {
      showToast(data.error || 'Failed to save', true);
      if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = '<i class="fas fa-paper-plane text-xs"></i>Save'; }
    }
  } catch(e) {
    showToast('Failed to save edit', true);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = '<i class="fas fa-paper-plane text-xs"></i>Save'; }
  }
}

function _finishEditUpdate(postId, post) {
  const card = document.querySelector(`.post-card[data-post-id="${postId}"]`);
  if (!card) return;
  const contentWrap = card.querySelector('.post-content-wrap');
  const textEl = contentWrap?.querySelector('.post-content-text');
  if (textEl) {
    textEl.innerHTML = formatContent(post.content || '');
    if (window._customEmojiMap) {
      textEl.innerHTML = textEl.innerHTML.replace(/:([a-zA-Z0-9_-]+):/g, (m, code) => {
        const url = window._customEmojiMap[code];
        return url ? `<img src="${url}" alt="${m}" title="${m}" class="inline-block w-6 h-6 object-contain align-middle" style="vertical-align:-4px">` : m;
      });
    }
  }
  // Re-render game tag pill immediately - prefer Steam CDN cover, fall back to IGDB cover from edit state
  const tagWrap = card.querySelector('.post-game-tag-wrap');
  if (tagWrap) {
    const editState = _editState[postId];
    const fallbackCover = editState && editState.gameTag && editState.gameTag.cover_url;
    tagWrap.innerHTML = buildGameTagHtml(post.game_tag_name, post.game_tag_steam_id, post.game_tag_cover_url || fallbackCover);
  }
  // Update data attributes so next edit open pre-populates correctly
  card.dataset.gameTagName = post.game_tag_name || '';
  card.dataset.gameTagSteamId = post.game_tag_steam_id || '';
  card.dataset.gameTagId = post.game_tag_id || '';
  const badgeSlot = card.querySelector('.edited-badge-slot');
  if (badgeSlot && post.edited_at) {
    badgeSlot.innerHTML = `<button onclick="showEditHistory(event, ${postId})" class="text-gray-500 hover:text-gray-300 text-xs transition"><i class="fas fa-pencil-alt text-[10px] mr-0.5"></i>edited ${timeAgo(post.edited_at)}</button>`;
  }
}

// Delete post
async function deletePost(event, postId) {
  event.stopPropagation();
  if (!confirm('Delete this post? This cannot be undone.')) return;
  try {
    const res = await csrfFetch(`/api/posts/${postId}/`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      const card = document.querySelector(`.post-card[data-post-id="${postId}"]`);
      if (card) {
        card.style.transition = 'opacity 0.3s';
        card.style.opacity = '0';
        setTimeout(() => card.remove(), 300);
      }
      // If on the post detail page, go back to feed
      if (window.location.pathname.startsWith('post/')) {
        window.location.href = '';
      }
      showToast('Post deleted');
    } else {
      showToast(data.error || 'Failed to delete', true);
    }
  } catch(e) { showToast('Failed to delete post', true); }
}

// Show edit history modal
async function showEditHistory(event, postId) {
  event.stopPropagation();
  try {
    const res = await fetch(`/api/posts/${postId}/edit-history/`);
    const data = await res.json();
    if (!data.history) return;

    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function ago(ts) {
      const s = Math.floor(Date.now() / 1000) - ts;
      if (s < 60) return 'just now';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return new Date(ts * 1000).toLocaleString();
    }

    let versionsHtml = '';
    // Reverse so newest is first
    [...data.history].reverse().forEach(v => {
      const label = v.is_current
        ? `<span class="text-indigo-400 font-semibold text-xs">Current version</span>`
        : `<span class="text-gray-500 text-xs">Version ${v.version} &middot; ${ago(v.edited_at)}</span>`;
      versionsHtml += `
        <div class="border border-neutral-700 rounded-lg p-3 ${v.is_current ? 'border-indigo-500/50 bg-indigo-500/5' : 'bg-neutral-800/40'}">
          <div class="mb-1.5">${label}</div>
          <p class="text-gray-200 text-sm whitespace-pre-wrap">${esc(v.content_before)}</p>
        </div>`;
    });

    // Build and show modal
    const existing = document.getElementById('edit-history-modal');
    if (existing) existing.remove();

    const modal = document.createElement('div');
    modal.id = 'edit-history-modal';
    modal.className = 'fixed inset-0 z-50 flex items-center justify-center p-4';
    modal.innerHTML = `
      <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="document.getElementById('edit-history-modal').remove()"></div>
      <div class="relative bg-neutral-900 border border-neutral-700 rounded-2xl w-full max-w-lg max-h-[80vh] flex flex-col shadow-2xl">
        <div class="flex items-center justify-between px-5 py-4 border-b border-neutral-800">
          <h3 class="text-white font-semibold">Edit History <span class="text-gray-500 text-sm font-normal">(${data.edit_count} edit${data.edit_count !== 1 ? 's' : ''})</span></h3>
          <button onclick="document.getElementById('edit-history-modal').remove()" class="text-gray-500 hover:text-white transition">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="overflow-y-auto p-4 flex flex-col gap-3">
          ${versionsHtml}
        </div>
      </div>`;
    document.body.appendChild(modal);
  } catch(e) { console.error('Edit history error:', e); }
}


// Like toggle
async function toggleLike(postId, btn) {
  const isLiked = btn.classList.contains('text-red-400');
  const method = isLiked ? 'DELETE' : 'POST';
  try {
    const res = await csrfFetch(`/api/posts/${postId}/like/`, { method });
    const data = await res.json();
    if (data.success) {
      const icon = btn.querySelector('i');
      const count = btn.querySelector('.like-count');
      if (data.liked) {
        btn.classList.remove('text-gray-500', 'hover:text-red-400');
        btn.classList.add('text-red-400');
        icon.className = 'fas fa-heart';
      } else {
        btn.classList.remove('text-red-400');
        btn.classList.add('text-gray-500', 'hover:text-red-400');
        icon.className = 'far fa-heart';
      }
      count.textContent = data.like_count;
    }
  } catch(e) { console.error('Like error:', e); }
}

// Comments toggle
async function toggleComments(postId) {
  const container = document.getElementById(`comments-${postId}`);
  if (container.classList.contains('hidden')) {
    container.classList.remove('hidden');
    await loadComments(postId);
  } else {
    container.classList.add('hidden');
  }
}

async function loadComments(postId) {
  const container = document.getElementById(`comments-${postId}`);
  container.innerHTML = '<p class="text-gray-500 text-sm">Loading...</p>';

  try {
    const res = await fetch(`/api/posts/${postId}/comments/`);
    const data = await res.json();

    const _card = document.querySelector(`.post-card[data-post-id="${postId}"]`);
    const _loggedIn = _card && _card.dataset.currentUserId && _card.dataset.currentUserId !== '';
    let html = _loggedIn
      ? buildCommentComposer(postId)
      : `<div class="bg-neutral-800/40 border border-neutral-700 rounded-xl p-4 mb-3 text-center">
           <p class="text-gray-400 text-sm mb-2">Sign in to leave a comment</p>
           <a href="/login/?next=${encodeURIComponent(window.location.pathname)}" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-4 py-2 rounded-lg transition">Sign In</a>
         </div>`;

    if (data.comments && data.comments.length > 0) {
      function renderTree(c) {
        let out = renderComment(c, c.parent_id != null);
        if (c.replies && c.replies.length) {
          c.replies.forEach(r => { out += renderTree(r); });
        }
        return out;
      }
      data.comments.forEach(c => { html += renderTree(c); });
    } else {
      html += '<p class="text-gray-500 text-sm text-center">No comments yet</p>';
    }
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<p class="text-red-400 text-sm">Failed to load comments</p>';
  }
}

function renderComment(comment, isReply = false) {
  function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  const indent = isReply ? 'ml-8' : '';
  const author = comment.author || {};
  const likedClass = comment.liked_by_me ? 'text-red-400' : 'text-gray-500';
  const likeIcon = comment.liked_by_me ? 'fas fa-heart' : 'far fa-heart';

  const cmtFlairBadge = author.flair_emoji
    ? `<span class="text-xs text-yellow-300 ml-0.5" title="${esc(author.flair_name || '')}">${esc(author.flair_emoji)}</span>`
    : '';
  const cmtRankBadge = author.rank_title
    ? `<span class="text-xs text-amber-400/60 ml-0.5">· ${esc(author.rank_title)}</span>`
    : '';
  const cmtVipBadge = author.is_vip && !author.flair_emoji
    ? `<span class="text-xs text-purple-300 ml-0.5" title="Early Tester">⭐</span>`
    : '';
  const cmtFfxivBadge = author.is_ffxiv_member
    ? `<span class="inline-flex items-center gap-0.5 text-xs text-blue-300 ml-0.5" title="Casual Heroes FC Member"><img src="/static/img/games/guilds/ffxiv_logo.png" class="w-3 h-3 object-contain inline-block"> Casual Heroes</span>`
    : '';
  const cmtAvatarEl = author.avatar_url
    ? `<img src="${esc(author.avatar_url)}" alt="" class="w-7 h-7 rounded-full object-cover flex-shrink-0 mt-0.5">`
    : `<div class="w-7 h-7 rounded-full bg-indigo-700 flex items-center justify-center text-white font-bold text-xs flex-shrink-0 mt-0.5 select-none">${esc((author.display_name || author.username || '?').charAt(0).toUpperCase())}</div>`;

  const cmtMediaHtml = comment.gif_url
    ? `<img src="${esc(comment.gif_url)}" alt="GIF" class="mt-2 max-h-48 rounded-lg object-contain">`
    : comment.image_url
    ? `<img src="${esc(comment.image_url)}" alt="" class="mt-2 max-h-64 rounded-lg object-contain">`
    : '';

  return `
    <div class="flex gap-2 mb-2 ${indent}" data-comment-id="${comment.id}">
      ${cmtAvatarEl}
      <div class="flex-1 min-w-0">
        <div class="bg-neutral-800/50 rounded-lg px-3 py-2">
          <span class="inline-flex items-center flex-wrap gap-x-0.5">
            <a href="/u/${esc(author.username)}/" class="text-white text-xs font-semibold hover:underline">${esc(author.display_name || author.username)}</a>${cmtFlairBadge}${cmtRankBadge}${cmtVipBadge}${cmtFfxivBadge}
          </span>
          ${comment.content ? `<p class="comment-content-text text-gray-300 text-sm">${formatContent(comment.content)}</p>` : `<p class="comment-content-text text-gray-300 text-sm hidden"></p>`}
          ${cmtMediaHtml}
          <div class="comment-edit-area hidden mt-1">
            <textarea class="comment-edit-textarea w-full bg-neutral-700 border border-neutral-600 rounded-lg px-2 py-1.5 text-sm text-white resize-none focus:outline-none focus:border-indigo-500" rows="2" maxlength="500">${esc(comment.content)}</textarea>
            <div class="flex items-center justify-between mt-1">
              <div class="flex items-center gap-0.5">
                <button type="button" onmousedown="event.preventDefault();_cmtEditFmt(${comment.id},'bold')" class="px-1.5 py-0.5 text-xs text-gray-400 hover:text-white hover:bg-neutral-700 rounded transition font-bold" title="Bold">B</button>
                <button type="button" onmousedown="event.preventDefault();_cmtEditFmt(${comment.id},'italic')" class="px-1.5 py-0.5 text-xs text-gray-400 hover:text-white hover:bg-neutral-700 rounded transition italic" title="Italic">I</button>
                <button type="button" onmousedown="event.preventDefault();_cmtEditFmt(${comment.id},'underline')" class="px-1.5 py-0.5 text-xs text-gray-400 hover:text-white hover:bg-neutral-700 rounded transition underline" title="Underline">U</button>
              </div>
              <div class="flex gap-2">
                <button onclick="saveCommentEdit(${comment.id})" class="text-xs px-2.5 py-1 rounded bg-indigo-600 hover:bg-indigo-700 text-white transition">Save</button>
                <button onclick="cancelCommentEdit(${comment.id})" class="text-xs px-2.5 py-1 rounded bg-neutral-700 hover:bg-neutral-600 text-gray-300 transition">Cancel</button>
              </div>
            </div>
          </div>
        </div>
        <div class="comment-actions flex items-center gap-3 mt-1 px-1">
          <button onclick="toggleCommentLike(${comment.id}, this)" class="${likedClass} text-xs transition hover:text-red-400">
            <i class="${likeIcon}"></i> ${comment.like_count || 0}
          </button>
          <button onclick="showReplyInput(${comment.id})" class="text-gray-500 text-xs hover:text-blue-400">Reply</button>
          ${comment.can_edit ? `<button onclick="editComment(${comment.id})" class="text-gray-500 text-xs hover:text-indigo-400">Edit</button>` : ''}
          ${comment.can_delete ? `<button onclick="deleteComment(${comment.id})" class="text-gray-500 text-xs hover:text-red-400">Delete</button>` : ''}
        </div>
      </div>
    </div>`;
}

function _closeCmtComposer(cid) {
  const el = document.getElementById(`composer-${cid}`);
  if (el) el.remove();
  delete _cmtState[cid];
}

function _cmtFmt(cid, type) {
  const ta = document.getElementById(`cmt-text-${cid}`);
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  const map = { bold: ['**','**'], italic: ['*','*'], underline: ['<u>','</u>'] };
  const [pre, post] = map[type];
  const ins = sel || (type === 'bold' ? 'bold' : type === 'italic' ? 'italic' : 'underline');
  ta.value = ta.value.substring(0, s) + pre + ins + post + ta.value.substring(e);
  ta.selectionStart = s + pre.length;
  ta.selectionEnd = s + pre.length + ins.length;
  ta.focus();
  _cmtCharCount(cid);
}

function _cmtEditFmt(commentId, type) {
  const editArea = document.querySelector(`[data-comment-id="${commentId}"] .comment-edit-area`);
  const ta = editArea ? editArea.querySelector('.comment-edit-textarea') : null;
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  const map = { bold: ['**','**'], italic: ['*','*'], underline: ['<u>','</u>'] };
  const [pre, post] = map[type];
  const ins = sel || (type === 'bold' ? 'bold' : type === 'italic' ? 'italic' : 'underline');
  ta.value = ta.value.substring(0, s) + pre + ins + post + ta.value.substring(e);
  ta.selectionStart = s + pre.length;
  ta.selectionEnd = s + pre.length + ins.length;
  ta.focus();
}

function _cmtCharCount(cid) {
  const ta = document.getElementById(`cmt-text-${cid}`);
  const el = document.getElementById(`cmt-chars-${cid}`);
  if (ta && el) el.textContent = `${ta.value.length}/500`;
}

function _cmtToggleGif(cid, postId) {
  const gif = document.getElementById(`cmt-gif-picker-${cid}`);
  const emoji = document.getElementById(`cmt-emoji-picker-${cid}`);
  if (!gif) return;
  if (emoji) emoji.classList.add('hidden');
  const opening = gif.classList.contains('hidden');
  gif.classList.toggle('hidden');
  if (opening) {
    setTimeout(() => document.getElementById(`cmt-gif-search-${cid}`)?.focus(), 50);
    _cmtLoadTrending(cid);
  }
}

function _cmtToggleEmoji(cid) {
  const emoji = document.getElementById(`cmt-emoji-picker-${cid}`);
  const gif = document.getElementById(`cmt-gif-picker-${cid}`);
  if (!emoji) return;
  if (gif) gif.classList.add('hidden');
  const opening = emoji.classList.contains('hidden');
  emoji.classList.toggle('hidden');
  if (opening) {
    _cmtEmojiCat(cid, 'gaming', emoji.querySelector(`.cmt-ecat-${cid}`));
    const map = window._customEmojiMap || {};
    const lolUrl = map['lol'];
    const tabBtn = document.getElementById(`cmt-custom-tab-${cid}`);
    if (lolUrl && tabBtn) tabBtn.innerHTML = `<img src="${lolUrl}" class="w-4 h-4 object-contain inline-block" style="vertical-align:-2px" alt=":lol:">`;
  }
}

function _cmtEmojiCat(cid, cat, btn) {
  document.querySelectorAll(`.cmt-ecat-${cid}`).forEach(b => {
    b.className = `cmt-ecat-${cid} text-xs px-2 py-0.5 rounded text-gray-400 hover:bg-neutral-700`;
  });
  if (btn) btn.className = `cmt-ecat-${cid} text-xs px-2 py-0.5 rounded bg-neutral-700 text-white`;
  const grid = document.getElementById(`cmt-emoji-grid-${cid}`);
  const customGrid = document.getElementById(`cmt-custom-emoji-grid-${cid}`);
  if (cat === 'custom') {
    if (grid) grid.classList.add('hidden');
    if (customGrid) {
      customGrid.classList.remove('hidden');
      const map = window._customEmojiMap || {};
      const entries = Object.entries(map);
      customGrid.innerHTML = entries.length
        ? entries.map(([code, url]) =>
            `<button type="button" data-cid="${cid}" data-code=":${code}:" onclick="_cmtInsertCustomEmoji(this)" class="hover:bg-neutral-700 rounded p-0.5 transition" title=":${code}:">
               <img src="${url}" class="w-7 h-7 object-contain" alt=":${code}:">
             </button>`
          ).join('')
        : '<p class="col-span-8 text-center text-gray-500 text-xs py-3">No custom emoji yet.</p>';
    }
  } else {
    if (customGrid) customGrid.classList.add('hidden');
    if (grid) {
      grid.classList.remove('hidden');
      if (_CMT_EMOJIS[cat]) {
        grid.innerHTML = _CMT_EMOJIS[cat].map(e =>
          `<button type="button" onclick="_cmtInsertEmoji('${cid}','${e}')" class="text-lg hover:bg-neutral-700 rounded p-0.5 transition">${e}</button>`
        ).join('');
      }
    }
  }
}

function _cmtInsertCustomEmoji(btn) {
  const cid = btn.dataset.cid;
  const shortcode = btn.dataset.code;
  const ta = document.getElementById(`cmt-text-${cid}`);
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  ta.value = ta.value.substring(0, s) + shortcode + ta.value.substring(e);
  ta.selectionStart = ta.selectionEnd = s + shortcode.length;
  ta.focus();
  _cmtCharCount(cid);
}

function _cmtInsertEmoji(cid, emoji) {
  const ta = document.getElementById(`cmt-text-${cid}`);
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  ta.value = ta.value.substring(0, s) + emoji + ta.value.substring(e);
  ta.selectionStart = ta.selectionEnd = s + emoji.length;
  ta.focus();
  _cmtCharCount(cid);
}

async function _cmtLoadTrending(cid) {
  const results = document.getElementById(`cmt-gif-results-${cid}`);
  if (!results) return;
  results.innerHTML = '<p class="col-span-3 text-gray-500 text-xs text-center py-3">Loading...</p>';
  try {
    const res = await fetch('/api/gifs/trending/');
    const data = await res.json();
    _cmtRenderGifs(cid, data.results || []);
  } catch(e) {
    results.innerHTML = '<p class="col-span-3 text-gray-500 text-xs text-center py-3">GIFs unavailable</p>';
  }
}

function _cmtGifSearch(cid, query) {
  const state = _getCmtState(cid);
  clearTimeout(state.gifTimer);
  if (!query || query.length < 2) { _cmtLoadTrending(cid); return; }
  state.gifTimer = setTimeout(async () => {
    const results = document.getElementById(`cmt-gif-results-${cid}`);
    if (!results) return;
    results.innerHTML = '<p class="col-span-3 text-gray-500 text-xs text-center py-3">Searching...</p>';
    try {
      const res = await fetch(`/api/gifs/search/?q=${encodeURIComponent(query)}`);
      const data = await res.json();
      _cmtRenderGifs(cid, data.results || []);
    } catch(e) {
      results.innerHTML = '<p class="col-span-3 text-gray-500 text-xs text-center py-3">Search failed</p>';
    }
  }, 400);
}

function _cmtRenderGifs(cid, gifs) {
  const results = document.getElementById(`cmt-gif-results-${cid}`);
  if (!results) return;
  if (!gifs.length) { results.innerHTML = '<p class="col-span-3 text-gray-500 text-xs text-center py-3">No GIFs found</p>'; return; }
  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  results.innerHTML = gifs.map(g =>
    `<button type="button" onclick="_cmtSelectGif('${cid}','${esc(g.url)}','${esc(g.preview)}')"
      class="overflow-hidden rounded hover:ring-2 hover:ring-purple-500 transition cursor-pointer">
      <img src="${esc(g.preview)}" alt="GIF" class="w-full h-20 object-cover" loading="lazy">
    </button>`
  ).join('');
}

function _cmtSelectGif(cid, url, preview) {
  const state = _getCmtState(cid);
  state.gif = url;
  state.image = null;
  _cmtShowMediaPreview(cid, `<div class="relative inline-block"><img src="${preview}" class="max-h-28 rounded-lg"><button type="button" onclick="_cmtClearMedia('${cid}')" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center hover:bg-red-600"><i class="fas fa-times"></i></button></div>`);
  document.getElementById(`cmt-gif-picker-${cid}`)?.classList.add('hidden');
}

function _cmtShowMediaPreview(cid, html) {
  const el = document.getElementById(`cmt-media-preview-${cid}`);
  if (!el) return;
  el.innerHTML = html;
  el.classList.remove('hidden');
}

function _cmtClearMedia(cid) {
  const state = _getCmtState(cid);
  state.gif = null;
  state.image = null;
  const el = document.getElementById(`cmt-media-preview-${cid}`);
  if (el) { el.innerHTML = ''; el.classList.add('hidden'); }
}

async function _cmtImageSelect(cid, input, postId) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const fd = new FormData();
  fd.append('image', file);
  try {
    const res = await csrfFetch('/api/upload/image/', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.image_url) {
      const state = _getCmtState(cid);
      state.image = data.image_url;
      state.gif = null;
      const thumb = data.thumbnail_url || data.image_url;
      _cmtShowMediaPreview(cid, `<div class="relative inline-block"><img src="${thumb}" class="max-h-28 rounded-lg"><button type="button" onclick="_cmtClearMedia('${cid}')" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center hover:bg-red-600"><i class="fas fa-times"></i></button></div>`);
    } else {
      alert(data.error || 'Upload failed');
    }
  } catch(e) { alert('Upload failed'); }
}

async function _submitCmt(cid, postId, parentId) {
  const ta = document.getElementById(`cmt-text-${cid}`);
  const state = _getCmtState(cid);
  const content = ta ? ta.value.trim() : '';
  if (!content && !state.gif && !state.image) return;

  const btn = document.querySelector(`#composer-${cid} button[onclick*="_submitCmt"]`);
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin text-xs"></i>'; }

  const payload = { content };
  if (parentId) payload.parent_id = parentId;
  if (state.gif) payload.gif_url = state.gif;
  if (state.image) payload.image_url = state.image;

  try {
    const res = await csrfFetch(`/api/posts/${postId}/comments/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.success) {
      if (parentId) {
        _closeCmtComposer(cid);
      } else {
        if (ta) ta.value = '';
        _cmtClearMedia(cid);
        _cmtCharCount(cid);
      }
      await loadComments(postId);
      if (!parentId) {
        const card = document.querySelector(`[data-post-id="${postId}"]`);
        if (card) {
          const commentBtn = card.querySelector('button:nth-child(2) span');
          if (commentBtn) commentBtn.textContent = parseInt(commentBtn.textContent || '0') + 1;
        }
      }
    } else {
      alert(data.error || 'Failed to post');
      if (btn) { btn.disabled = false; btn.innerHTML = `<i class="fas fa-paper-plane text-xs"></i>${parentId ? 'Reply' : 'Comment'}`; }
    }
  } catch(e) {
    console.error('Comment submit error:', e);
    if (btn) { btn.disabled = false; btn.innerHTML = `<i class="fas fa-paper-plane text-xs"></i>${parentId ? 'Reply' : 'Comment'}`; }
  }
}

function showReplyInput(commentId) {
  document.querySelectorAll('.reply-input-row').forEach(el => el.remove());
  const commentEl = document.querySelector(`[data-comment-id="${commentId}"]`);
  if (!commentEl) return;
  const container = commentEl.closest('[id^="comments-"]');
  const postId = container ? parseInt(container.id.replace('comments-', '')) : 0;

  const wrapper = document.createElement('div');
  wrapper.className = 'reply-input-row';
  wrapper.innerHTML = buildCommentComposer(postId, { isReply: true, replyToId: commentId, placeholder: 'Write a reply...' });
  commentEl.after(wrapper);
  document.getElementById(`cmt-text-reply-${commentId}`)?.focus();
}

// Legacy stubs kept so old inline onclick refs don't break
async function submitComment(event, postId) {
  event.preventDefault();
  await _submitCmt(`cmt-${postId}`, postId, null);
}
async function submitReply(commentId, inputEl) {
  const container = inputEl?.closest('[id^="comments-"]');
  if (!container) return;
  const postId = parseInt(container.id.replace('comments-', ''));
  const content = inputEl.value.trim();
  if (!content) return;
  try {
    const res = await csrfFetch(`/api/posts/${postId}/comments/`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, parent_id: commentId }),
    });
    const data = await res.json();
    if (data.success) { inputEl.closest('.reply-input-row')?.remove(); await loadComments(postId); }
    else alert(data.error || 'Failed to post reply');
  } catch(e) { console.error(e); }
}

async function toggleCommentLike(commentId, btn) {
  const isLiked = btn.classList.contains('text-red-400');
  const method = isLiked ? 'DELETE' : 'POST';
  try {
    const res = await csrfFetch(`/api/comments/${commentId}/like/`, { method });
    const data = await res.json();
    if (data.success) {
      if (data.liked) {
        btn.classList.remove('text-gray-500');
        btn.classList.add('text-red-400');
        btn.querySelector('i').className = 'fas fa-heart';
      } else {
        btn.classList.remove('text-red-400');
        btn.classList.add('text-gray-500');
        btn.querySelector('i').className = 'far fa-heart';
      }
      btn.innerHTML = `<i class="${data.liked ? 'fas' : 'far'} fa-heart"></i> ${data.like_count}`;
    }
  } catch(e) { console.error('Comment like error:', e); }
}

function editComment(commentId) {
  const el = document.querySelector(`[data-comment-id="${commentId}"]`);
  if (!el) return;
  const contentEl = el.querySelector('.comment-content-text');
  const editArea = el.querySelector('.comment-edit-area');
  const textarea = el.querySelector('.comment-edit-textarea');
  const actions = el.querySelector('.comment-actions');
  if (!contentEl || !editArea || !textarea) return;
  textarea.value = contentEl.textContent.trim();
  contentEl.classList.add('hidden');
  editArea.classList.remove('hidden');
  if (actions) actions.classList.add('hidden');
  textarea.focus();
  textarea.selectionStart = textarea.selectionEnd = textarea.value.length;
  textarea.style.height = 'auto';
  textarea.style.height = textarea.scrollHeight + 'px';
}

function cancelCommentEdit(commentId) {
  const el = document.querySelector(`[data-comment-id="${commentId}"]`);
  if (!el) return;
  el.querySelector('.comment-content-text').classList.remove('hidden');
  el.querySelector('.comment-edit-area').classList.add('hidden');
  const actions = el.querySelector('.comment-actions');
  if (actions) actions.classList.remove('hidden');
}

async function saveCommentEdit(commentId) {
  const el = document.querySelector(`[data-comment-id="${commentId}"]`);
  if (!el) return;
  const textarea = el.querySelector('.comment-edit-textarea');
  const trimmed = textarea.value.trim();
  if (!trimmed) return;
  try {
    const res = await csrfFetch(`/api/comments/${commentId}/`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: trimmed }),
    });
    const data = await res.json();
    if (data.success) {
      const contentEl = el.querySelector('.comment-content-text');
      contentEl.innerHTML = formatContent(data.content);
      cancelCommentEdit(commentId);
    } else {
      alert(data.error || 'Failed to save comment');
    }
  } catch(e) { console.error('Edit comment error:', e); }
}

async function deleteComment(commentId) {
  if (!confirm('Delete this comment?')) return;
  try {
    const res = await csrfFetch(`/api/comments/${commentId}/`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      const el = document.querySelector(`[data-comment-id="${commentId}"]`);
      if (el) {
        el.style.transition = 'opacity 0.2s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 200);
      }
    } else {
      alert(data.error || 'Failed to delete comment');
    }
  } catch(e) { console.error('Delete comment error:', e); }
}

// Quick follow from post card
async function quickFollow(userId, btn) {
  try {
    const res = await csrfFetch(`/api/follow/${userId}/`, { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      btn.innerHTML = '<i class="fas fa-check mr-1"></i>Following';
      btn.className = 'follow-card-btn text-xs px-2.5 py-1 rounded-full bg-neutral-700 text-gray-300 cursor-default';
      btn.onclick = null;
      // Remove from suggested list if present, update following count
      const suggestedCard = document.querySelector(`[data-suggested-user="${userId}"]`);
      if (suggestedCard) {
        suggestedCard.style.transition = 'opacity 0.3s';
        suggestedCard.style.opacity = '0';
        setTimeout(() => suggestedCard.remove(), 300);
      }
      const countEl = document.getElementById('header-following-count');
      if (countEl) countEl.textContent = (parseInt(countEl.textContent) || 0) + 1;
    }
  } catch(e) { console.error('Follow error:', e); }
}

// Share / copy link
function sharePost(publicId) {
  const shareUrl = `${location.origin}post/${publicId}/`;

  if (navigator.share) {
    navigator.share({ title: 'QuestLog Post', url: shareUrl }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(shareUrl).then(() => {
      showToast('Link copied to clipboard!');
    }).catch(() => {
      showToast('Could not copy link');
    });
  }
}

// Post collapse / expand (long posts)
function togglePostCollapse(btn) {
  const wrap = btn.closest('.post-content-collapse');
  if (!wrap) return;
  const textEl = wrap.querySelector('.post-content-clamp');
  const expanded = wrap.dataset.expanded === 'true';
  if (expanded) {
    textEl.style.maxHeight = '14rem';
    textEl.style.maskImage = 'linear-gradient(to bottom,black 60%,transparent 100%)';
    textEl.style.webkitMaskImage = 'linear-gradient(to bottom,black 60%,transparent 100%)';
    btn.innerHTML = '<i class="fas fa-chevron-down text-[10px]"></i>Show more';
    wrap.dataset.expanded = 'false';
  } else {
    textEl.style.maxHeight = 'none';
    textEl.style.maskImage = 'none';
    textEl.style.webkitMaskImage = 'none';
    btn.innerHTML = '<i class="fas fa-chevron-up text-[10px]"></i>Show less';
    wrap.dataset.expanded = 'true';
  }
}

// Simple toast notification
function showToast(message) {
  const existing = document.getElementById('toast-notif');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'toast-notif';
  toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-neutral-800 border border-neutral-700 text-white px-4 py-2 rounded-lg text-sm shadow-lg z-50 transition-opacity';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
}
</script>
