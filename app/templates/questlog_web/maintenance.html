<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casual Heroes | Maintenance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0a0a0a; }
    @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse-slow { animation: pulse-slow 3s ease-in-out infinite; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">
  <div class="text-center max-w-lg px-6">

    <!-- Icon -->
    <div class="mb-8 flex justify-center">
      <div class="relative">
        <div class="w-24 h-24 rounded-full bg-amber-500/10 border-2 border-amber-500/30 flex items-center justify-center pulse-slow">
          <svg class="w-12 h-12 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="text-3xl font-bold text-white mb-3">
      Down for Maintenance
    </h1>
    <p class="text-neutral-400 text-lg mb-6 leading-relaxed">
      Casual Heroes is temporarily offline for maintenance.<br>
      We'll be back shortly. Thanks for your patience.
    </p>

    <!-- Status badge -->
    <div class="inline-flex items-center gap-2 bg-amber-500/10 border border-amber-500/30 text-amber-300 text-sm px-4 py-2 rounded-full mb-8">
      <span class="w-2 h-2 rounded-full bg-amber-400 pulse-slow"></span>
      Maintenance in Progress
    </div>

    <!-- Divider -->
    <div class="border-t border-neutral-800 pt-6">
      <p class="text-neutral-600 text-sm">
        Check back soon. We apologize for the inconvenience.
      </p>
    </div>

  </div>
</body>
</html>
