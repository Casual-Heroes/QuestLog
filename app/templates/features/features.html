{% extends "base.html" %}
{% load static %}
{% block content %}

<h1 class="text-4xl font-bold mb-6">Opinion & Features</h1>

<div class="grid md:grid-cols-3 gap-8">
  {% for article in articles %}
    <a href="/features/{{ article.slug }}" class="group block rounded-xl overflow-hidden shadow-lg hover:shadow-blue-400/50 transition">
      <img src="{% static article.image_url %}" class="w-full h-48 object-cover" alt="{{ article.title }}">
      <div class="p-4 bg-neutral-900 text-white">
        <h2 class="text-xl font-semibold mb-2 group-hover:text-indigo-400">{{ article.title }}</h2>
        <p class="text-sm text-gray-400">{{ article.summary }}</p>
      </div>
    </a>
  {% endfor %}
</div>

{% endblock %}
