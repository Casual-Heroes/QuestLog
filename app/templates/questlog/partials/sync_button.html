<!-- Sync Button Component -->
<button id="syncButton" onclick="forceGuildSync()" class="bg-neutral-800 hover:bg-neutral-700 text-white px-4 py-2 rounded-lg font-medium transition text-sm">
  <i id="syncIcon" class="fas fa-sync-alt mr-2"></i>
  <span id="syncText">Sync Data</span>
</button>

<script>
// Only define forceGuildSync if it doesn't already exist
if (typeof forceGuildSync === 'undefined') {
  window.forceGuildSync = async function() {
    // Sync button clicked
    const button = document.getElementById('syncButton');
    const icon = document.getElementById('syncIcon');
    const text = document.getElementById('syncText');

    if (!button || !icon || !text) {
      // Sync button elements not found
      return;
    }

    // Disable button
    button.disabled = true;
    button.classList.add('opacity-50', 'cursor-not-allowed');
    icon.classList.add('fa-spin');
    text.textContent = 'Syncing...';

    try {
      const guildId = '{{ guild.id }}';
      const csrfToken = '{{ csrf_token }}';
      const syncUrl = '/questlog/api/guild/' + guildId + '/sync/';

      // Syncing guild:

      const response = await csrfFetch(syncUrl, {
        method: 'POST'
      });

      // Response status:
      const data = await response.json();
      // Response data:

      if (data.success) {
        // Success - reload page to show updated data
        text.textContent = 'Synced!';
        setTimeout(() => {
          location.reload();
        }, 500);
      } else {
        // Error - show message and re-enable button
        alert('Sync failed: ' + (data.error || 'Unknown error'));
        text.textContent = 'Sync Failed';
        setTimeout(() => {
          text.textContent = 'Sync Data';
          icon.classList.remove('fa-spin');
          button.classList.remove('opacity-50', 'cursor-not-allowed');
          button.disabled = false;
        }, 2000);
      }
    } catch (error) {
      // Sync error:
      alert('Sync error: ' + error.message);
      text.textContent = 'Connection Error';
      setTimeout(() => {
        text.textContent = 'Sync Data';
        icon.classList.remove('fa-spin');
        button.classList.remove('opacity-50', 'cursor-not-allowed');
        button.disabled = false;
      }, 2000);
    }
  }
}
</script>
