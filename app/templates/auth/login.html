{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20 bg-neutral-900 p-8 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold text-white mb-6">Login to Your Hosting Panel</h2>
    <form method="POST">
        {% csrf_token %}
        {% for message in messages %}
            <div class="text-red-500">{{ message }}</div>
        {% endfor %}
        <input type="text" name="username" placeholder="Username" class="w-full p-2 mb-4 rounded bg-neutral-800 text-white">
        <input type="password" name="password" placeholder="Password" class="w-full p-2 mb-6 rounded bg-neutral-800 text-white">
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">Login</button>
    </form>
</div>
{% endblock %}
