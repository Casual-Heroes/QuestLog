<!-- Game Card Template -->
<div class="bg-[#11111f] p-6 rounded-xl shadow-md hover:shadow-indigo-500/40 hover:scale-[1.02] transition-all duration-300 border border-transparent hover:border-indigo-400">
    <h3 class="text-lg font-semibold text-white mb-2">{{ game.name }}</h3>
  
    <p class="text-gray-300 mb-2">
      {{ game.description }}
    </p>
  
    <p class="text-sm text-indigo-300 mb-4">
      Active Players: <span class="font-medium text-indigo-400">{{ game.active_players }} / {{ game.max_players }}</span>
    </p>
  
    <a href="{{ game.steam_link }}" target="_blank"
       class="text-sm text-indigo-400 hover:text-indigo-300 transition">
       View on Steam ↗
    </a>
  </div>
  

  <div class="card">
    <h3>{{ game.name }}</h3>
    <p>{{ game.description }}</p>
    <p>Active Players: {{ game.online }}/{{ game.max }}</p>
    <a href="{{ game.steam_link }}" target="_blank">View on Steam ↗</a>
  </div>
